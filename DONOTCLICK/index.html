<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>

<script>
const videos = [
  "https://ik.imagekit.io/6uxka2lzx/___Japan%20is%20turning%20footsteps%20into%20electricity!Using%20piezoelectric%20tiles,%20every%20step%20you%20take.mp4?tr=orig",
  "https://ik.imagekit.io/6uxka2lzx/-2125518007084190756.mp4?tr=orig",
  "https://ik.imagekit.io/6uxka2lzx/skopbeatz289fa89.mp4",
  "https://ik.imagekit.io/6uxka2lzx/watermark.mov",
  "https://ik.imagekit.io/6uxka2lzx/ScreenRecording_04-10-2026%2019-42-19_1.mov"
];

const chosen = videos[Math.floor(Math.random() * videos.length)];

document.write(`
<meta property="og:type" content="video.other">
<meta property="og:title" content="Random Video Feed">
<meta property="og:description" content="Auto-selected media stream">
<meta property="og:video" content="${chosen}">
<meta property="og:video:type" content="video/mp4">
<meta property="og:video:width" content="1280">
<meta property="og:video:height" content="720">

<meta name="twitter:card" content="player">
<meta name="twitter:player" content="${chosen}">
<meta name="twitter:player:width" content="1280">
<meta name="twitter:player:height" content="720">
`);
</script>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    height: 100vh;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  audio {
    display: none;
  }
</style>
</head>

<body>

<video id="vid" autoplay muted playsinline>
  <source id="vsrc" src="">
</video>

<audio id="aud">
  <source id="asrc" src="">
</audio>

<script>
const vid = document.getElementById("vid");
const aud = document.getElementById("aud");

document.getElementById("vsrc").src = chosen;
document.getElementById("asrc").src = chosen;

vid.load();
aud.load();

vid.play().catch(() => {});

aud.play().catch(() => {
  document.body.addEventListener("click", () => {
    aud.play();
  }, { once: true });
});
</script>

</body>
</html>
