<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Spinner • Drag & Drop</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 12px 24px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      text-align: center;
      z-index: 100;
      pointer-events: none;
    }
    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 100;
    }
    #dropzone {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #dropzone.active {
      opacity: 1;
      pointer-events: all;
    }
    .drop-text {
      font-size: 2rem;
      text-align: center;
      padding: 40px;
      border: 3px dashed #00ffcc;
      border-radius: 20px;
    }
  </style>
</head>
<body>

  <div id="ui">
    <strong>3D Model Viewer</strong> — Drag & Drop .glb / .gltf / .obj
  </div>

  <div id="info">
    Drag to orbit • Scroll to zoom • Auto-spinning enabled
  </div>

  <div id="dropzone">
    <div class="drop-text">
      Drop your 3D model here<br>
      <small style="font-size:1rem;opacity:0.8;">.glb  .gltf  .obj supported</small>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/OBJLoader.js"></script>

  <script>
    // Scene setup
    let scene, camera, renderer, controls;
    let currentModel = null;
    let autoRotateSpeed = 0.5;

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 2, 8);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      // Lights
      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(5, 10, 7);
      dirLight.castShadow = true;
      scene.add(dirLight);

      const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x112233, 0.4);
      scene.add(hemiLight);

      // Controls
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.autoRotate = true;
      controls.autoRotateSpeed = autoRotateSpeed;
      controls.target.set(0, 1, 0);

      // Grid helper
      const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
      scene.add(grid);

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      // Resize handler
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // Load GLTF/GLB
    function loadGLTF(urlOrFile) {
      const loader = new THREE.GLTFLoader();
      if (typeof urlOrFile === 'string') {
        loader.load(urlOrFile, onLoadGLTF);
      } else {
        const reader = new FileReader();
        reader.onload = (e) => {
          loader.parse(e.target.result, '', onLoadGLTF);
        };
        reader.readAsArrayBuffer(urlOrFile);
      }
    }

    function onLoadGLTF(gltf) {
      if (currentModel) scene.remove(currentModel);
      currentModel = gltf.scene;
      scene.add(currentModel);

      // Center and scale model
      const box = new THREE.Box3().setFromObject(currentModel);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 5 / maxDim;

      currentModel.scale.set(scale, scale, scale);
      currentModel.position.sub(center.multiplyScalar(scale));
      currentModel.position.y += 0.5; // slight lift

      controls.target.copy(currentModel.position);
    }

    // Load OBJ
    function loadOBJ(file) {
      const loader = new THREE.OBJLoader();
      const reader = new FileReader();
      reader.onload = (e) => {
        if (currentModel) scene.remove(currentModel);
        currentModel = loader.parse(e.target.result);
        scene.add(currentModel);

        // Center and scale
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 5 / maxDim;

        currentModel.scale.set(scale, scale, scale);
        currentModel.position.sub(center.multiplyScalar(scale));
        currentModel.position.y += 0.5;

        controls.target.copy(currentModel.position);
      };
      reader.readAsText(file);
    }

    // Drag & Drop handling
    const dropzone = document.getElementById('dropzone');

    function handleDrop(e) {
      e.preventDefault();
      dropzone.classList.remove('active');

      const file = e.dataTransfer.files[0];
      if (!file) return;

      const ext = file.name.toLowerCase().split('.').pop();

      if (ext === 'glb' || ext === 'gltf') {
        loadGLTF(file);
      } else if (ext === 'obj') {
        loadOBJ(file);
      } else {
        alert("Supported formats: .glb, .gltf, .obj");
      }
    }

    // Demo model on load (a nice free astronaut from three.js examples)
    function loadDemo() {
      loadGLTF('https://threejs.org/examples/models/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf');
    }

    // Event listeners
    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('active');
    });

    document.addEventListener('dragleave', () => {
      dropzone.classList.remove('active');
    });

    document.addEventListener('drop', handleDrop);

    // Click to load demo if no model
    document.addEventListener('click', () => {
      if (!currentModel) loadDemo();
    }, { once: true });

    // Initialize
    init();
    loadDemo(); // Load a cool helmet as starting example
  </script>
</body>
</html>
