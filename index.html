<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LunaFlix</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #0f0c1a;
      color: #e0d8ff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #sidebar {
      width: 380px;
      background: #0f0c1a;
      border-right: 1px solid #2a2550;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transform: translateX(0);
    }

    #sidebar.hidden {
      transform: translateX(-100%);
    }

    #header {
      padding: 16px 20px;
      font-size: 1.6rem;
      font-weight: bold;
      color: #a78bfa;
      letter-spacing: -0.5px;
      border-bottom: 1px solid #2a2550;
    }

    #menuToggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 101;
      background: #1e1b38;
      color: #a78bfa;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 1.2rem;
      cursor: pointer;
    }

    #toggle {
      display: flex;
      padding: 12px 20px;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #1e1b38;
      color: #e0d8ff;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    button:hover { background: #2a2550; }
    button.active {
      background: #7c3aed;
      color: white;
      box-shadow: 0 0 10px rgba(124,58,237,0.4);
    }

    #search-wrap {
      position: relative;
      margin: 0 20px 16px;
    }

    #search {
      width: 100%;
      padding: 10px 14px 10px 44px;
      border-radius: 6px;
      background: #1e1b38;
      border: none;
      color: #e0d8ff;
      font-size: 0.95rem;
    }

    #search:focus {
      background: #2a2550;
      box-shadow: 0 0 0 2px #a78bfa;
    }

    #search::placeholder { color: #8a7dff; }

    #search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #8a7dff;
      pointer-events: none;
    }

    #list {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 80px;
    }

    #list::-webkit-scrollbar { width: 4px; }
    #list::-webkit-scrollbar-thumb { background: #2a2550; border-radius: 4px; }

    .item {
      padding: 12px 16px;
      margin: 8px 0;
      background: #181527;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.22s ease;
      opacity: 0;
      transform: translateY(20px);
    }

    .item.visible { opacity: 1; transform: translateY(0); }

    .item:hover {
      background: #2a2550;
      transform: translateY(-3px);
    }

    .item.active {
      background: #28233f;
      border: 1px solid #a78bfa;
    }

    .star {
      font-size: 1.4rem;
      color: #8a7dff;
      transition: all 0.2s;
    }

    .star:hover { transform: scale(1.3); color: #c4b5fd; }
    .star.fav { color: #c4b5fd; transform: scale(1.1); }

    #loadingMore {
      text-align: center;
      padding: 30px 0;
      color: #a78bfa;
    }

    #player {
      flex: 1;
      background: #000;
      position: relative;
      min-height: 200px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    iframe.loaded { opacity: 1; }

    #bottomPanels {
      padding: 16px 20px;
      border-top: 1px solid #2a2550;
      background: #0f0c1a;
      font-size: 0.92rem;
    }

    .panelTitle {
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 10px;
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 0.8px;
    }

    .smallItem {
      padding: 8px 0;
      color: #d1c8ff;
      cursor: pointer;
    }

    .smallItem:hover { color: #c4b5fd; }

    /* Mobile / tablet */
    @media (max-width: 900px) {
      body { flex-direction: column; }
      #sidebar {
        width: 320px;
        transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); }
      #menuToggle { display: block; }
      #player { flex: 1 1 auto; }
      #header { font-size: 1.4rem; padding: 12px 16px; }
      .item { font-size: 0.94rem; }
    }

    @media (max-width: 500px) {
      #sidebar { width: 85%; }
      #toggle button { font-size: 0.9rem; padding: 8px; }
      #search { font-size: 0.9rem; padding-left: 40px; }
    }
  </style>
</head>
<body>

<button id="menuToggle">☰</button>

<div id="sidebar" class="hidden">
  <div id="header">LunaFlix</div>

  <div id="toggle">
    <button id="movieBtn" class="active">Movies</button>
    <button id="tvBtn">TV</button>
  </div>

  <div id="search-wrap">
    <svg id="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.3-4.3"/>
    </svg>
    <input id="search" placeholder="Search titles..." autocomplete="off"/>
  </div>

  <div id="list"></div>
  <div id="loadingMore" style="display:none;">Loading more...</div>

  <div id="bottomPanels">
    <div class="panelTitle">Favorites</div>
    <div id="favorites"></div>
    <div class="panelTitle" style="margin-top:14px;">Recent</div>
    <div id="recent"></div>
  </div>
</div>

<div id="player">
  <iframe id="frame" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
</div>

<script>
const BASE_EMBED = "https://vidsrc.cc/v2/embed";  // Reverted to original vidsrc.cc (may have ads/redirects)
const BATCH_SIZE = 20;
const SCROLL_THRESHOLD = 400;

let currentType = localStorage.getItem("type") || "movie";
let allItems = [];
let displayedCount = 0;
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");
let activeEl = null;

const sidebar = document.getElementById("sidebar");
const menuToggle = document.getElementById("menuToggle");
const listEl = document.getElementById("list");
const loadingMore = document.getElementById("loadingMore");
const searchEl = document.getElementById("search");

// Mobile menu toggle
menuToggle.onclick = () => {
  sidebar.classList.toggle("open");
  sidebar.classList.toggle("hidden");
};

// Close sidebar on outside click (mobile)
document.addEventListener("click", e => {
  if (window.innerWidth > 900) return;
  if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
    sidebar.classList.add("hidden");
    sidebar.classList.remove("open");
  }
});

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); setTimeout(() => fn(...args), ms); };
}

async function loadData() {
  listEl.innerHTML = "";
  displayedCount = 0;
  loadingMore.style.display = "block";

  try {
    const url = currentType === "movie"
      ? "https://vidsrc.cc/api/list/movie"
      : "https://vidsrc.cc/api/list/tv";
    const res = await fetch(url);
    const json = await res.json();
    allItems = Array.isArray(json) ? json : json.data || [];
    renderNextBatch();
  } catch (err) {
    allItems = [
      { title: "Arcane", tmdb: "995133", imdb: "tt11126994" },
      { title: "The Boys", tmdb: "82856", imdb: "tt1190634" },
      { title: "Invincible", tmdb: "95557", imdb: "tt6741278" },
      { title: "Squid Game", tmdb: "93405", imdb: "tt10919420" },
      { title: "Wednesday", tmdb: "119051", imdb: "tt13443470" },
      { title: "Stranger Things", tmdb: "66732", imdb: "tt4574334" },
      { title: "The Umbrella Academy", tmdb: "79126", imdb: "tt1312171" },
      { title: "The Witcher", tmdb: "71912", imdb: "tt5180504" },
      { title: "Bridgerton", tmdb: "87771", imdb: "tt2741602" },
      { title: "You", tmdb: "81040", imdb: "tt7335184" }
    ];
    renderNextBatch();
    listEl.insertAdjacentHTML('afterbegin', '<div style="padding:10px 16px;color:#a78bfa;font-size:0.9rem;">Demo titles (API unavailable)</div>');
  }
}

function renderNextBatch() {
  if (displayedCount >= allItems.length) {
    loadingMore.style.display = "none";
    return;
  }

  const frag = document.createDocumentFragment();
  const end = Math.min(displayedCount + BATCH_SIZE, allItems.length);

  for (let i = displayedCount; i < end; i++) {
    const item = allItems[i];
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <span>${item.title || item.name || "Untitled"}</span>
      <span class="star ${favorites.some(f => (f.tmdb || f.imdb) === (item.tmdb || item.imdb)) ? "fav" : ""}">★</span>
    `;

    div.querySelector(".star").onclick = e => {
      e.stopPropagation();
      toggleFavorite(item, div);
    };

    div.onclick = () => selectItem(item, div);

    frag.appendChild(div);
  }

  listEl.appendChild(frag);
  displayedCount = end;

  setTimeout(() => {
    listEl.querySelectorAll('.item:not(.visible)').forEach((el, idx) => {
      setTimeout(() => el.classList.add('visible'), idx * 40);
    });
    loadingMore.style.display = "none";
  }, 100);
}

function selectItem(item, el) {
  if (activeEl) activeEl.classList.remove("active");
  el.classList.add("active");
  activeEl = el;
  playItem(item);
  addRecent(item);
  if (window.innerWidth <= 900) {
    sidebar.classList.add("hidden");
    sidebar.classList.remove("open");
  }
}

function playItem(item) {
  const id = item.imdb?.startsWith("tt") ? item.imdb : item.tmdb;
  if (!id) return;

  let url = `${BASE_EMBED}/${currentType}/${id}?autoPlay=false`;

  const frame = document.getElementById("frame");
  frame.classList.remove("loaded");
  frame.src = url;
  frame.onload = () => frame.classList.add("loaded");
}

function toggleFavorite(item, itemEl) {
  const key = item.tmdb || item.imdb;
  const idx = favorites.findIndex(f => (f.tmdb || f.imdb) === key);
  const star = itemEl.querySelector(".star");

  if (idx > -1) {
    favorites.splice(idx, 1);
    star.classList.remove("fav");
  } else {
    favorites.push(item);
    star.classList.add("fav");
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderBottom("favorites");
}

function addRecent(item) {
  const key = item.tmdb || item.imdb;
  recent = recent.filter(r => (r.tmdb || r.imdb) !== key);
  recent.unshift(item);
  recent = recent.slice(0, 6);
  localStorage.setItem("recent", JSON.stringify(recent));
  renderBottom("recent");
}

function renderBottom(section) {
  const cont = document.getElementById(section);
  cont.innerHTML = "";
  const items = section === "favorites" ? favorites.slice(-6) : recent;
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "smallItem";
    div.textContent = item.title || item.name || "Untitled";
    div.onclick = () => playItem(item);
    cont.appendChild(div);
  });
}

document.getElementById("movieBtn").onclick = () => {
  currentType = "movie";
  localStorage.setItem("type", currentType);
  document.getElementById("movieBtn").classList.add("active");
  document.getElementById("tvBtn").classList.remove("active");
  loadData();
};

document.getElementById("tvBtn").onclick = () => {
  currentType = "tv";
  localStorage.setItem("type", currentType);
  document.getElementById("tvBtn").classList.add("active");
  document.getElementById("movieBtn").classList.remove("active");
  loadData();
};

searchEl.addEventListener("input", debounce(e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    // Optional: reload full list if you cache it earlier
    loadData();  // simplest way to reset
    return;
  }
  const filtered = allItems.filter(i => (i.title || i.name || "").toLowerCase().includes(q));
  listEl.innerHTML = "";
  displayedCount = 0;
  allItems = filtered;
  renderNextBatch();
}, 250));

listEl.addEventListener("scroll", () => {
  if (listEl.scrollTop + listEl.clientHeight >= listEl.scrollHeight - SCROLL_THRESHOLD) {
    renderNextBatch();
  }
});

// Initial load
if (currentType === "tv") {
  document.getElementById("tvBtn").click();
} else {
  document.getElementById("movieBtn").click();
}

renderBottom("favorites");
renderBottom("recent");
</script>
</body>
</html>
